name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Fragment.sln

      - name: Build (Release)
        run: dotnet build Fragment.sln -c Release --no-restore

      - name: Publish (framework-dependent)
        run: dotnet publish src/Fragment/Fragment.csproj -c Release -o publish --no-restore

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Fragment-win
          path: publish

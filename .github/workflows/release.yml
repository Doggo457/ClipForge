name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file exe
        run: >
          dotnet publish src/ClipForge/ClipForge.csproj -c Release -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Name the artifact
        run: Rename-Item -Path publish/ClipForge.exe -NewName ClipForge-win-x64.exe

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/ClipForge-win-x64.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
